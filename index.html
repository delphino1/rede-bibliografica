<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Rede Bibliográfica Interativa</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #0f0f1a; color: #ddd; display: flex; height: 100vh; overflow: hidden; }

#sigma-container { flex: 1; position: relative; background: #0f0f1a; }

#panel {
  width: 300px;
  background: #13131f;
  border-left: 1px solid #2a2a3e;
  padding: 20px 16px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  overflow-y: auto;
  flex-shrink: 0;
}

h1 { font-size: 13px; font-weight: 400; color: #666; line-height: 1.5; }
h1 span { display: block; font-size: 15px; color: #c8cfe8; font-weight: 600; margin-bottom: 2px; }

#load-area {
  background: #1c1c2e;
  border: 1.5px dashed #3a3a5c;
  border-radius: 10px;
  padding: 20px 14px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s;
}
#load-area:hover { border-color: #6c63ff; }
#load-area p { font-size: 12px; color: #888; line-height: 1.6; }
#load-area strong { color: #aaa; font-size: 13px; display: block; margin-bottom: 6px; }
#file-input { display: none; }

#load-btn {
  width: 100%;
  padding: 9px;
  background: #6c63ff;
  border: none;
  border-radius: 8px;
  color: #fff;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  margin-top: 10px;
  transition: background 0.2s;
}
#load-btn:hover { background: #5a52d5; }

#search {
  width: 100%;
  padding: 9px 12px;
  background: #1c1c2e;
  border: 1px solid #3a3a5c;
  border-radius: 8px;
  color: #ddd;
  font-size: 13px;
  outline: none;
  transition: border-color 0.2s;
  display: none;
}
#search:focus { border-color: #6c63ff; }
#search.visible { display: block; }

#node-info {
  background: #1c1c2e;
  border-radius: 10px;
  padding: 14px;
  font-size: 13px;
  line-height: 1.7;
  color: #777;
  display: none;
}
#node-info.visible { display: block; }
#node-info h2 { font-size: 14px; font-weight: 600; color: #c8cfe8; margin-bottom: 6px; line-height: 1.4; }
#node-info .meta { font-size: 12px; color: #555; margin-top: 8px; }
#node-info .meta span { color: #888; }

#legend { display: none; flex-direction: column; gap: 7px; }
#legend.visible { display: flex; }
.legend-title { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.08em; }
.legend-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #999; cursor: pointer; padding: 3px 0; }
.legend-item:hover { color: #ddd; }
.legend-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }

#stats { font-size: 11px; color: #444; display: none; }
#stats.visible { display: block; }

#hint {
  position: absolute;
  bottom: 16px;
  left: 16px;
  background: rgba(0,0,0,0.55);
  color: #666;
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 6px;
  pointer-events: none;
  display: none;
}
#hint.visible { display: block; }

#loading-msg {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  color: #555;
  font-size: 13px;
  display: none;
}
#loading-msg.visible { display: block; }

.tag {
  display: inline-block;
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 20px;
  margin-bottom: 8px;
  font-weight: 500;
}
</style>
</head>
<body>

<div id="sigma-container">
  <div id="loading-msg">Carregando rede...</div>
  <div id="hint">Scroll para zoom · Arraste para navegar · Clique em um nó</div>
</div>

<div id="panel">
  <h1><span>Rede Bibliográfica</span>Visualizador interativo</h1>

  <div id="load-area" onclick="document.getElementById('file-input').click()">
    <strong>Carregar arquivo GEXF</strong>
    <p>Clique aqui ou arraste o arquivo exportado do Gephi</p>
    <input type="file" id="file-input" accept=".gexf,.xml">
    <button id="load-btn" onclick="event.stopPropagation(); document.getElementById('file-input').click()">
      Selecionar arquivo
    </button>
  </div>

  <input type="text" id="search" class="" placeholder="🔍  Buscar autor..." />

  <div id="node-info"></div>

  <div id="legend">
    <p class="legend-title">Clusters (modularidade)</p>
    <div id="legend-items"></div>
  </div>

  <div id="stats"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/graphology@0.25.4/dist/graphology.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sigma@2.4.0/build/sigma.min.js"></script>
<script>
// Built-in GEXF parser (no external dependency)
function parseGEXF(xmlString) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlString, 'application/xml');
  const graph = new graphology.Graph({ multi: false });

  // Parse nodes
  const nodeElements = doc.querySelectorAll('node');
  nodeElements.forEach(nodeEl => {
    const id = nodeEl.getAttribute('id');
    const label = nodeEl.getAttribute('label') || id;
    const attrs = { label };

    // Parse viz attributes (Gephi visual export)
    const vizColor = nodeEl.querySelector('color');
    if (vizColor) {
      const r = vizColor.getAttribute('r') || 128;
      const g = vizColor.getAttribute('g') || 128;
      const b = vizColor.getAttribute('b') || 128;
      attrs.color = `rgb(${Math.round(r)},${Math.round(g)},${Math.round(b)})`;
    }
    const vizSize = nodeEl.querySelector('size');
    if (vizSize) attrs.size = parseFloat(vizSize.getAttribute('value')) || 5;

    const vizPos = nodeEl.querySelector('position');
    if (vizPos) {
      attrs.x = parseFloat(vizPos.getAttribute('x')) || Math.random() * 100;
      attrs.y = parseFloat(vizPos.getAttribute('y')) || Math.random() * 100;
    } else {
      attrs.x = Math.random() * 100;
      attrs.y = Math.random() * 100;
    }

    // Parse data attributes
    nodeEl.querySelectorAll('attvalue').forEach(av => {
      const forAttr = av.getAttribute('for') || av.getAttribute('id');
      const val = av.getAttribute('value');
      if (forAttr) attrs[forAttr] = val;
    });

    try { graph.addNode(id, attrs); } catch(e) {}
  });

  // Parse edges
  const edgeElements = doc.querySelectorAll('edge');
  edgeElements.forEach(edgeEl => {
    const id = edgeEl.getAttribute('id');
    const source = edgeEl.getAttribute('source');
    const target = edgeEl.getAttribute('target');
    const weight = parseFloat(edgeEl.getAttribute('weight')) || 1;
    try {
      if (graph.hasNode(source) && graph.hasNode(target) && !graph.hasEdge(source, target)) {
        graph.addEdge(source, target, { weight });
      }
    } catch(e) {}
  });

  // Parse attribute definitions for modularity
  const attrDefs = {};
  doc.querySelectorAll('attributes[class="node"] attribute').forEach(attr => {
    attrDefs[attr.getAttribute('id')] = attr.getAttribute('title');
  });

  // Map attribute IDs to names
  graph.forEachNode((node, attrs) => {
    Object.entries(attrDefs).forEach(([id, title]) => {
      if (attrs[id] !== undefined) {
        graph.setNodeAttribute(node, title, attrs[id]);
        if (title.toLowerCase().includes('modularity')) {
          graph.setNodeAttribute(node, 'modClass', attrs[id]);
        }
      }
    });
  });

  return graph;
}
</script>
<script>
let renderer = null;
let currentGraph = null;
let hoveredNode = null;
let highlightedCluster = null;

// Drag and drop support
const container = document.getElementById('sigma-container');
const loadArea = document.getElementById('load-area');

loadArea.addEventListener('dragover', e => { e.preventDefault(); loadArea.style.borderColor = '#6c63ff'; });
loadArea.addEventListener('dragleave', () => { loadArea.style.borderColor = '#3a3a5c'; });
loadArea.addEventListener('drop', e => {
  e.preventDefault();
  loadArea.style.borderColor = '#3a3a5c';
  const file = e.dataTransfer.files[0];
  if (file) processFile(file);
});

document.getElementById('file-input').addEventListener('change', function() {
  if (this.files[0]) processFile(this.files[0]);
});

function processFile(file) {
  const reader = new FileReader();
  document.getElementById('loading-msg').classList.add('visible');
  reader.onload = function(e) {
    try {
      loadGEXF(e.target.result);
    } catch(err) {
      document.getElementById('loading-msg').classList.remove('visible');
      alert('Erro ao carregar o arquivo: ' + err.message + '\n\nVerifique se o arquivo é um GEXF válido exportado do Gephi.');
    }
  };
  reader.readAsText(file);
}

function loadGEXF(gexfString) {
  // Destroy previous renderer
  if (renderer) { renderer.kill(); renderer = null; }

  // Parse GEXF
  const graph = parseGEXF(gexfString);
  currentGraph = graph;

  // Filter edges by weight (keep only weight >= 7, matching Gephi filter)
  const weakEdges = [];
  graph.forEachEdge((edge, attrs) => {
    if ((attrs.weight || 1) < 7) weakEdges.push(edge);
  });
  weakEdges.forEach(e => graph.dropEdge(e));

  // Remove nodes with no connections after edge filter
  const toRemove = [];
  graph.forEachNode((node) => {
    if (graph.degree(node) === 0) toRemove.push(node);
  });
  toRemove.forEach(n => graph.dropNode(n));

  // Keep only giant component (BFS from highest-degree node)
  let maxDeg = 0, startNode = null;
  graph.forEachNode((node) => {
    const d = graph.degree(node);
    if (d > maxDeg) { maxDeg = d; startNode = node; }
  });
  if (startNode) {
    const visited = new Set();
    const queue = [startNode];
    while (queue.length) {
      const n = queue.shift();
      if (visited.has(n)) continue;
      visited.add(n);
      graph.neighbors(n).forEach(nb => { if (!visited.has(nb)) queue.push(nb); });
    }
    const outsideComponent = [];
    graph.forEachNode((node) => { if (!visited.has(node)) outsideComponent.push(node); });
    outsideComponent.forEach(n => graph.dropNode(n));
  }

  // Build color map from modularity classes that already have valid colors
  const classColorMap = {};
  graph.forEachNode((node, attrs) => {
    if (attrs.modClass !== undefined && attrs.modClass !== null) {
      const c = attrs.color;
      if (c && c !== "#888888" && !c.includes("128,128,128") && !classColorMap[attrs.modClass]) {
        classColorMap[attrs.modClass] = c;
      }
    }
  });

  // Assign palette colors to classes that still lack a color
  const palette2 = ["#6c63ff","#2ec4a7","#e87d3e","#e84393","#5b9cf6","#f0c040","#a0d468","#8067dc","#ff6b6b","#4ecdc4"];
  let paletteIdx = 0;
  graph.forEachNode((node, attrs) => {
    const cls = attrs.modClass;
    if (!attrs.color || attrs.color === "#888888" || attrs.color.includes("128,128,128")) {
      if (cls !== undefined && cls !== null) {
        if (!classColorMap[cls]) {
          classColorMap[cls] = palette2[paletteIdx++ % palette2.length];
        }
        graph.setNodeAttribute(node, "color", classColorMap[cls]);
      } else {
        graph.setNodeAttribute(node, "color", "#555566");
      }
    }
  });

  // Normalize node attributes from Gephi export
  // Gephi exports r,g,b as separate attributes or as color string
  const clusterColors = {};
  let clusterCounter = 0;
  const palette = [
    '#6c63ff','#2ec4a7','#e87d3e','#e84393','#5b9cf6',
    '#f0c040','#a0d468','#8067dc','#ff6b6b','#4ecdc4',
    '#96c0ce','#ff9f43','#ee5a24','#0652dd','#9980fa'
  ];

  graph.forEachNode((node, attrs) => {
    // Gephi exports node color as r,g,b attributes
    let color = '#888888';
    if (attrs.color) {
      color = attrs.color;
    } else if (attrs.r !== undefined) {
      const r = Math.round(attrs.r);
      const g = Math.round(attrs.g);
      const b = Math.round(attrs.b);
      color = `rgb(${r},${g},${b})`;
    }

    // Get modularity class
    const modClass = attrs['modularity_class'] !== undefined
      ? String(attrs['modularity_class'])
      : (attrs['Modularity Class'] !== undefined ? String(attrs['Modularity Class']) : null);

    if (modClass !== null && !clusterColors[modClass]) {
      clusterColors[modClass] = color;
    }

    // Normalize size
    const size = attrs.size || attrs.Size || 5;

    graph.setNodeAttribute(node, 'color', color);
    graph.setNodeAttribute(node, '_gephi_size', parseFloat(size) || 5);
    graph.setNodeAttribute(node, 'modClass', modClass);

    // Ensure label
    if (!attrs.label) {
      graph.setNodeAttribute(node, 'label', node);
    }
  });

  // Scale node size by degree (applied after all nodes loaded)
  let maxDegree = 1;
  graph.forEachNode((node) => {
    const d = graph.degree(node);
    if (d > maxDegree) maxDegree = d;
  });
  graph.forEachNode((node, attrs) => {
    const d = graph.degree(node);
    // Size from 3 (min) to 18 (max), scaled by degree
    const scaled = 3 + (d / maxDegree) * 15;
    graph.setNodeAttribute(node, 'size', Math.round(scaled * 10) / 10);
  });

  // Nudge nodes slightly toward their cluster centroid for visual separation
  const centroids = {};
  const clusterCounts = {};
  graph.forEachNode((node, attrs) => {
    const cls = attrs.modClass || '0';
    if (!centroids[cls]) { centroids[cls] = {x:0, y:0}; clusterCounts[cls] = 0; }
    centroids[cls].x += attrs.x || 0;
    centroids[cls].y += attrs.y || 0;
    clusterCounts[cls]++;
  });
  Object.keys(centroids).forEach(cls => {
    centroids[cls].x /= clusterCounts[cls];
    centroids[cls].y /= clusterCounts[cls];
  });
  // Overall graph centroid
  let gcx = 0, gcy = 0, gcount = 0;
  graph.forEachNode((node, attrs) => { gcx += attrs.x||0; gcy += attrs.y||0; gcount++; });
  gcx /= gcount; gcy /= gcount;
  // Push cluster centroids away from graph center
  graph.forEachNode((node, attrs) => {
    const cls = attrs.modClass || '0';
    const cx = centroids[cls].x;
    const cy = centroids[cls].y;
    const dx = cx - gcx;
    const dy = cy - gcy;
    const push = 0.18;
    graph.setNodeAttribute(node, 'x', (attrs.x||0) + dx * push);
    graph.setNodeAttribute(node, 'y', (attrs.y||0) + dy * push);
  });

  // Normalize edges
  graph.forEachEdge((edge, attrs) => {
    graph.setEdgeAttribute(edge, 'color', '#2a2a3e');
    graph.setEdgeAttribute(edge, 'size', 0.5);
  });

  // Setup renderer
  renderer = new Sigma(graph, document.getElementById('sigma-container'), {
    renderEdgeLabels: false,
    labelFont: "-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif",
    labelSize: 12,
    labelWeight: '500',
    labelColor: { color: '#cccccc' },
    labelRenderedSizeThreshold: 6,
    minCameraRatio: 0.05,
    maxCameraRatio: 10,
    nodeReducer(node, data) {
      const res = { ...data };
      if (highlightedCluster !== null) {
        const attrs = graph.getNodeAttributes(node);
        if (String(attrs.modClass) === String(highlightedCluster)) {
          res.highlighted = true;
          res.zIndex = 1;
          res.size = data.size * 1.3;
        } else {
          res.color = '#1e1e2e';
          res.label = '';
          res.size = data.size * 0.4;
        }
      } else if (hoveredNode) {
        if (node === hoveredNode || graph.neighbors(hoveredNode).includes(node)) {
          res.highlighted = true;
          res.zIndex = 1;
        } else {
          res.color = '#1e1e2e';
          res.label = '';
          res.size = data.size * 0.5;
        }
      }
      return res;
    },
    edgeReducer(edge, data) {
      const res = { ...data };
      if (highlightedCluster !== null) {
        const [s, t] = graph.extremities(edge);
        const sc = String(graph.getNodeAttribute(s, 'modClass'));
        const tc = String(graph.getNodeAttribute(t, 'modClass'));
        if (sc === String(highlightedCluster) && tc === String(highlightedCluster)) {
          res.color = '#6a6a9e';
          res.size = 1.5;
        } else {
          res.color = '#111120';
          res.size = 0.2;
        }
      } else if (hoveredNode) {
        const [s, t] = graph.extremities(edge);
        if (s === hoveredNode || t === hoveredNode) {
          res.color = '#5a5a7e';
          res.size = 1.5;
        } else {
          res.color = '#111120';
          res.size = 0.2;
        }
      }
      return res;
    }
  });

  renderer.on('enterNode', ({ node }) => {
    hoveredNode = node;
    renderer.refresh();
  });
  renderer.on('leaveNode', () => {
    hoveredNode = null;
    renderer.refresh();
  });
  renderer.on('clickNode', ({ node }) => showNodeInfo(node));
  renderer.on('clickStage', () => {
    hoveredNode = null;
    highlightedCluster = null;
    renderer.refresh();
    document.getElementById('node-info').classList.remove('visible');
    document.getElementById('node-info').innerHTML = '';
    // Reset legend item styles
    document.querySelectorAll('.legend-item').forEach(el => el.style.opacity = '1');
  });

  // Update UI
  document.getElementById('loading-msg').classList.remove('visible');
  document.getElementById('load-area').style.display = 'none';
  document.getElementById('search').classList.add('visible');
  document.getElementById('node-info').classList.add('visible');
  document.getElementById('node-info').innerHTML = '<p style="color:#555">Clique em um nó para ver detalhes.</p>';
  document.getElementById('hint').classList.add('visible');
  document.getElementById('stats').classList.add('visible');
  document.getElementById('stats').textContent = `${graph.order} autores · ${graph.size} conexões`;

  // Build legend
  buildLegend(clusterColors);

  // Search
  document.getElementById('search').addEventListener('input', function() {
    const q = this.value.toLowerCase().trim();
    if (!q) { hoveredNode = null; renderer.refresh(); return; }
    let found = null;
    graph.forEachNode((node, attrs) => {
      if ((attrs.label || '').toLowerCase().includes(q)) found = node;
    });
    if (found) {
      hoveredNode = found;
      renderer.refresh();
      const pos = renderer.getNodeDisplayData(found);
      if (pos) renderer.getCamera().animate({ x: pos.x, y: pos.y, ratio: 0.3 }, { duration: 400 });
      showNodeInfo(found);
    }
  });
}

function showNodeInfo(node) {
  const a = currentGraph.getNodeAttributes(node);
  const info = document.getElementById('node-info');
  info.classList.add('visible');

  const degree = currentGraph.degree(node);
  const color = a.color || '#888';

  info.innerHTML = `
    <h2>${a.label || node}</h2>
    <span class="tag" style="background:${color}22;color:${color};border:1px solid ${color}44">
      Cluster ${a.modClass !== null ? a.modClass : '—'}
    </span>
    <div class="meta">
      <span>Conexões:</span> ${degree} autores co-citados<br>
    </div>
  `;
}

function buildLegend(clusterColors) {
  const legendItems = document.getElementById('legend-items');
  legendItems.innerHTML = '';
  const sorted = Object.entries(clusterColors).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
  sorted.forEach(([cls, color]) => {
    const div = document.createElement('div');
    div.className = 'legend-item';
    div.innerHTML = `<div class="legend-dot" style="background:${color}"></div> Cluster ${cls}`;
    div.dataset.cls = String(cls);
    div.onclick = () => highlightCluster(cls);
    legendItems.appendChild(div);
  });
  document.getElementById('legend').classList.add('visible');
}

function highlightCluster(cls) {
  if (!currentGraph || !renderer) return;

  // Toggle off if clicking same cluster
  if (String(highlightedCluster) === String(cls)) {
    highlightedCluster = null;
    renderer.refresh();
    document.querySelectorAll('.legend-item').forEach(el => el.style.opacity = '1');
    return;
  }

  highlightedCluster = cls;
  hoveredNode = null;
  renderer.refresh();

  // Dim non-selected legend items
  document.querySelectorAll('.legend-item').forEach(el => {
    el.style.opacity = el.dataset.cls === String(cls) ? '1' : '0.3';
  });

  // Zoom to cluster centroid
  let cx = 0, cy = 0, count = 0;
  currentGraph.forEachNode((node, attrs) => {
    if (String(attrs.modClass) === String(cls)) {
      const pos = renderer.getNodeDisplayData(node);
      if (pos) { cx += pos.x; cy += pos.y; count++; }
    }
  });
  if (count > 0) {
    renderer.getCamera().animate({ x: cx / count, y: cy / count, ratio: 0.4 }, { duration: 500 });
  }
}
</script>
</body>
</html>
